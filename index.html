<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE-Step vs Suno</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>ACE-Step vs Suno</h1>
  </header>

  <section class="controls">
    <button id="reveal-all" class="btn btn-secondary">Reveal all</button>
    <button id="hide-all" class="btn btn-secondary">Hide all</button>
    <button id="publish" class="btn">Publish bundle</button>
    <button id="clear-all" class="btn btn-ghost">Clear saved</button>
    <span id="save-status" class="hint"></span>
  </section>

  <section id="pairs-list" class="pairs"></section>

  <section class="add-row">
    <button id="add-pair" class="btn btn-add" type="button">+ Add pair</button>
  </section>

  <template id="pair-template">
    <article class="pair">
      <div class="pair-header">
        <input
          type="text"
          class="pair-prompt-input"
          placeholder="prompt for this pair…"
          autocomplete="off"
        />
        <button class="remove-btn" type="button" title="Remove this pair">×</button>
      </div>

      <div class="pair-uploads">
        <label class="upload-slot" data-source="acestep">
          <span class="upload-label">ACE-Step</span>
          <span class="upload-filename">No file selected</span>
          <input type="file" accept="audio/*" />
        </label>
        <label class="upload-slot" data-source="suno">
          <span class="upload-label">Suno</span>
          <span class="upload-filename">No file selected</span>
          <input type="file" accept="audio/*" />
        </label>
      </div>

      <div class="pair-sides hidden">
        <div class="side">
          <div class="side-label">
            <span>A</span>
            <span class="badge"></span>
          </div>
          <audio class="audio-a" controls preload="metadata"></audio>
        </div>
        <div class="side">
          <div class="side-label">
            <span>B</span>
            <span class="badge"></span>
          </div>
          <audio class="audio-b" controls preload="metadata"></audio>
        </div>
      </div>

      <div class="pair-actions hidden">
        <button class="reveal-btn" type="button">Reveal</button>
      </div>
    </article>
  </template>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
